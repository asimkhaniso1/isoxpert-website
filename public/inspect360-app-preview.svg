    <path d="M611.5 394l3 3 6-6.5" stroke="#16A34A" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="638" y="391" font-size="12" font-weight="600" fill="#16181D">Emergency exits clear &amp; signage visible</text>
