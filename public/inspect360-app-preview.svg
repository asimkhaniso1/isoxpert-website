    <text x="638" y="354" font-size="10" fill="#6B7280">All 14 units compliant</text>
    <rect x="960" y="330" width="64" height="20" rx="2" fill="#EAF7EF"/><text x="992" y="344" font-size="9.5" font-weight="700" fill="#16A34A" text-anchor="middle">PASS</text>
  </g>
