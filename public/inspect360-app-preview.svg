    <text x="774" y="568">Actions assigned</text>
    <rect x="902" y="548" width="148" height="32" rx="2" fill="#FFFFFF" stroke="#E5E7EB"/>
    <path d="M918 564l4 4 7-8" stroke="#16A34A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
